<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>牌盒 · 54 张扑克牌盘点</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<style>
  #page-loader{position:fixed;top:0;left:0;right:0;height:3px;z-index:9999;pointer-events:none;background:transparent;transition:opacity .4s ease}
  #page-loader .bar{height:100%;width:0;background:linear-gradient(90deg,#8a7440,#d4af37,#e8d9a8);box-shadow:0 0 8px rgba(212,175,55,.6);transition:width .4s cubic-bezier(.22,1,.36,1)}
  #page-loader.done{opacity:0}
</style>
<script>
(function(){
  var l=document.createElement('div');
  l.id='page-loader';
  l.innerHTML='<div class="bar"></div>';
  document.documentElement.appendChild(l);
  var total=5,done=0,fin=false;
  var b=l.querySelector('.bar');
  function tick(){
    done++;
    b.style.width=Math.min(100,done/total*100)+'%';
    if(done>=total&&!fin){
      fin=true;
      setTimeout(function(){
        l.classList.add('done');
        setTimeout(function(){if(l.parentNode)l.remove();},500);
      },250);
    }
  }
  window.__loaderTick=tick;
  window.__onFontsCssLoaded=function(){
    tick();
    if(document.fonts&&document.fonts.load){
      Promise.all([
        document.fonts.load('700 16px "Cinzel"'),
        document.fonts.load('400 16px "Outfit"'),
        document.fonts.load('italic 500 16px "Cormorant Garamond"')
      ]).then(function(){tick();},function(){tick();});
    }else{
      tick();
    }
  };
  setTimeout(function(){while(done<total)tick();},8000);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap" rel="stylesheet" onload="__onFontsCssLoaded()" />
<link rel="stylesheet" href="style.css" onload="__loaderTick()" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <span class="eyebrow">Card Inventory · 牌盒盘点</span>
        <h1>五十四<span class="accent">牌</span>册</h1>
        <span class="subtitle">勾选你手中持有的牌，缺失一目了然。</span>
      </div>
      <div class="stats">
        <div class="stat held">
          <div class="label">已持有</div>
          <div class="value"><span id="heldCount">0</span><span class="of">/54</span></div>
        </div>
        <div class="stat missing">
          <div class="label">缺失</div>
          <div class="value" id="missingCount">54</div>
        </div>
      </div>
    </header>

    <!-- Actions -->
    <div class="actions">
      <button class="btn" id="btnSelectAll">全选</button>
      <button class="btn" id="btnSelectNone">全不选</button>
      <button class="btn danger" id="btnReset">重置</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- Tag filters -->
    <div class="tags" id="tags">
      <div class="tag-group">
        <span class="tags-label">状态</span>
        <button class="tag active" data-type="status" data-filter="all">全部 <span class="count">(54)</span></button>
        <button class="tag" data-type="status" data-filter="held">已摸到 <span class="count" id="heldTagCount">(0)</span></button>
        <button class="tag" data-type="status" data-filter="missing">未摸到 <span class="count" id="missingTagCount">(54)</span></button>
      </div>
      <span class="tag-divider"></span>
      <div class="tag-group">
        <span class="tags-label">花色</span>
        <button class="tag active" data-type="suit" data-filter="all">全部</button>
        <button class="tag" data-type="suit" data-filter="spades"><span class="sym black">♠</span>黑桃 <span class="count">(13)</span></button>
        <button class="tag" data-type="suit" data-filter="hearts"><span class="sym red">♥</span>红心 <span class="count">(13)</span></button>
        <button class="tag" data-type="suit" data-filter="diamonds"><span class="sym red">♦</span>方块 <span class="count">(13)</span></button>
        <button class="tag" data-type="suit" data-filter="clubs"><span class="sym black">♣</span>梅花 <span class="count">(13)</span></button>
        <button class="tag" data-type="suit" data-filter="joker"><span class="sym gold">★</span>王牌 <span class="count">(2)</span></button>
      </div>
    </div>

    <!-- Card box -->
    <div class="box-section">
      <div class="cardbox" id="cardbox" role="checkbox" aria-checked="false" tabindex="0" title="点击切换牌盒是否已摸到">
        <div class="face lid"></div>
        <div class="stack">
          <div class="layer"></div>
          <div class="layer"></div>
          <div class="layer"></div>
        </div>
        <div class="face body">
          <div class="box-title">Deck Box</div>
          <div class="box-count"><span id="boxCount">0</span><span class="of"> / 54</span></div>
          <div class="box-sub" id="boxStateLabel">牌盒未摸到</div>
        </div>
        <div class="box-checkmark"></div>
      </div>
    </div>

    <!-- Card grid -->
    <main class="grid" id="grid"></main>

    <!-- Footer -->
    <footer class="footer">
      <span>数据存储于浏览器本地<span class="dot"></span>localStorage</span>
      <span id="lastSaved">尚未保存</span>
    </footer>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js" onload="__loaderTick()"></script>
</body>
</html>
